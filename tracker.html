                                            { id: 'd141-20', name: 'Real-time inference' },
                                            { id: 'd141-21', name: 'Latency optimization' }
                                        ]
                                    }
                                ],
                                project: 'Complete MLOps pipeline'
                            },
                            {
                                id: 'week46-48',
                                name: 'Week 46-48: Professional Skills & Final Project',
                                topics: [
                                    { 
                                        id: 'day151-160', 
                                        name: 'Day 151-160: Professional Development',
                                        subtopics: [
                                            { id: 'd151-1', name: 'Code review process' },
                                            { id: 'd151-2', name: 'Give constructive feedback' },
                                            { id: 'd151-3', name: 'Receive feedback' },
                                            { id: 'd151-4', name: 'Write clear documentation' },
                                            { id: 'd151-5', name: 'README best practices' },
                                            { id: 'd151-6', name: 'API documentation' },
                                            { id: 'd151-7', name: 'Code comments' },
                                            { id: 'd151-8', name: 'Technical writing' },
                                            { id: 'd151-9', name: 'ML interview prep' },
                                            { id: 'd151-10', name: 'Common ML questions' },
                                            { id: 'd151-11', name: 'Explain models simply' },
                                            { id: 'd151-12', name: 'Coding interviews' },
                                            { id: 'd151-13', name: 'LeetCode practice' },
                                            { id: 'd151-14', name: 'System design basics' },
                                            { id: 'd151-15', name: 'ML system design' },
                                            { id: 'd151-16', name: 'Scalability considerations' },
                                            { id: 'd151-17', name: 'Build portfolio' },
                                            { id: 'd151-18', name: 'GitHub profile' },
                                            { id: 'd151-19', name: 'LinkedIn optimization' },
                                            { id: 'd151-20', name: 'Portfolio website' },
                                            { id: 'd151-21', name: 'Open source contribution' },
                                            { id: 'd151-22', name: 'Find projects' },
                                            { id: 'd151-23', name: 'Submit pull requests' },
                                            { id: 'd151-24', name: 'Community engagement' }
                                        ]
                                    }
                                ],
                                project: 'Production-ready AI application from scratch'
                            }
                        ]
                    }
                ]
            };

            useEffect(() => {
                loadData();
            }, []);

            const loadData = () => {
                try {
                    const progressData = storage.get('ml-tracker-progress');
                    const notesData = storage.get('ml-tracker-notes');
                    const logsData = storage.get('ml-tracker-logs');
                    
                    if (progressData) setProgress(JSON.parse(progressData.value));
                    if (notesData) setNotes(JSON.parse(notesData.value));
                    if (logsData) setStudyLogs(JSON.parse(logsData.value));
                } catch (error) {
                    console.log('Starting fresh');
                } finally {
                    setLoading(false);
                }
            };

            const saveProgress = (newProgress) => {
                setProgress(newProgress);
                storage.set('ml-tracker-progress', JSON.stringify(newProgress));
            };

            const saveNotes = (newNotes) => {
                setNotes(newNotes);
                storage.set('ml-tracker-notes', JSON.stringify(newNotes));
            };

            const saveLogs = (newLogs) => {
                setStudyLogs(newLogs);
                storage.set('ml-tracker-logs', JSON.stringify(newLogs));
            };

            const toggleSubtopic = (subtopicId) => {
                const newProgress = { ...progress };
                newProgress[subtopicId] = !newProgress[subtopicId];
                saveProgress(newProgress);
            };

            const calculateProgress = () => {
                let totalSubtopics = 0;
                syllabus.phases.forEach(phase => {
                    phase.weeks.forEach(week => {
                        week.topics.forEach(topic => {
                            if (topic.subtopics) {
                                totalSubtopics += topic.subtopics.length;
                            }
                        });
                    });
                });
                const completedSubtopics = Object.values(progress).filter(Boolean).length;
                return totalSubtopics > 0 ? Math.round((completedSubtopics / totalSubtopics) * 100) : 0;
            };

            const calculatePhaseProgress = (phase) => {
                let totalSubtopics = 0;
                let completedSubtopics = 0;
                phase.weeks.forEach(week => {
                    week.topics.forEach(topic => {
                        if (topic.subtopics) {
                            totalSubtopics += topic.subtopics.length;
                            completedSubtopics += topic.subtopics.filter(st => progress[st.id]).length;
                        }
                    });
                });
                return totalSubtopics > 0 ? Math.round((completedSubtopics / totalSubtopics) * 100) : 0;
            };

            const calculateTopicProgress = (topic) => {
                if (!topic.subtopics) return 0;
                const completed = topic.subtopics.filter(st => progress[st.id]).length;
                return Math.round((completed / topic.subtopics.length) * 100);
            };

            const openNoteEditor = (topicId, topicName) => {
                setCurrentTopic({ id: topicId, name: topicName });
                setCurrentNote(notes[topicId] || '');
            };

            const saveNote = () => {
                if (currentTopic) {
                    const newNotes = { ...notes, [currentTopic.id]: currentNote };
                    saveNotes(newNotes);
                    
                    if (currentNote.trim()) {
                        const log = {
                            id: Date.now(),
                            date: new Date().toISOString(),
                            topic: currentTopic.name,
                            duration: 60,
                            notes: currentNote
                        };
                        const newLogs = [log, ...studyLogs];
                        saveLogs(newLogs);
                    }
                    
                    setCurrentTopic(null);
                    setCurrentNote('');
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center">
                        <div className="text-xl text-gray-600">Loading...</div>
                    </div>
                );
            }

            // Dashboard View
            if (activeView === 'dashboard') {
                const totalSubtopics = syllabus.phases.reduce((acc, phase) => 
                    acc + phase.weeks.reduce((wAcc, week) => 
                        wAcc + week.topics.reduce((tAcc, topic) => 
                            tAcc + (topic.subtopics?.length || 0), 0), 0), 0);

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8">
                        <div className="max-w-7xl mx-auto">
                            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-6">
                                <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                                    🎯 Complete AI/ML Mastery Tracker
                                </h1>
                                <p className="text-gray-600">12-month detailed journey • {totalSubtopics} checkboxes • Never miss anything!</p>
                                
                                <div className="mt-6">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-sm font-medium text-gray-700">Overall Progress</span>
                                        <span className="text-sm font-bold text-indigo-600">{calculateProgress()}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-4">
                                        <div 
                                            className="bg-gradient-to-r from-indigo-500 to-purple-500 h-4 rounded-full transition-all duration-500"
                                            style={{ width: `${calculateProgress()}%` }}
                                        />
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-gray-500 text-sm">Completed</p>
                                            <p className="text-3xl font-bold text-indigo-600">
                                                {Object.values(progress).filter(Boolean).length}
                                            </p>
                                            <p className="text-xs text-gray-400">of {totalSubtopics} subtopics</p>
                                        </div>
                                        <CheckCircle2 className="w-12 h-12 text-green-500" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-gray-500 text-sm">Study Sessions</p>
                                            <p className="text-3xl font-bold text-purple-600">{studyLogs.length}</p>
                                        </div>
                                        <Clock className="w-12 h-12 text-purple-500" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-gray-500 text-sm">Notes Written</p>
                                            <p className="text-3xl font-bold text-pink-600">
                                                {Object.keys(notes).length}
                                            </p>
                                        </div>
                                        <BookOpen className="w-12 h-12 text-pink-500" />
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {syllabus.phases.map((phase, index) => {
                                    const phaseProgress = calculatePhaseProgress(phase);
                                    return (
                                        <div
                                            key={phase.id}
                                            onClick={() => {
                                                setSelectedPhase(phase);
                                                setActiveView('phase-detail');
                                            }}
                                            className="bg-white rounded-2xl shadow-xl p-6 cursor-pointer hover:shadow-2xl transition-all transform hover:-translate-y-1"
                                        >
                                            <div className="flex items-start justify-between mb-4">
                                                <div>
                                                    <h3 className="text-xl font-bold text-gray-800">{phase.name}</h3>
                                                    <p className="text-sm text-gray-500">{phase.weeks.length} weeks</p>
                                                </div>
                                                <span className="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-sm font-semibold">
                                                    {phaseProgress}%
                                                </span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-3 mb-2">
                                                <div 
                                                    className="bg-gradient-to-r from-indigo-400 to-purple-400 h-3 rounded-full transition-all duration-500"
                                                    style={{ width: `${phaseProgress}%` }}
                                                />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // Phase Detail View
            if (activeView === 'phase-detail' && selectedPhase) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8">
                        <div className="max-w-6xl mx-auto">
                            <button
                                onClick={() => setActiveView('dashboard')}
                                className="mb-6 px-4 py-2 bg-white rounded-lg shadow hover:shadow-lg transition-all text-gray-700 font-medium"
                            >
                                ← Back
                            </button>

                            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-6">
                                <h2 className="text-3xl font-bold text-gray-800 mb-2">{selectedPhase.name}</h2>
                                <div className="mt-4">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-sm font-medium">Progress</span>
                                        <span className="text-sm font-bold text-indigo-600">{calculatePhaseProgress(selectedPhase)}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-4">
                                        <div 
                                            className="bg-gradient-to-r from-indigo-500 to-purple-500 h-4 rounded-full transition-all duration-500"
                                            style={{ width: `${calculatePhaseProgress(selectedPhase)}%` }}
                                        />
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {selectedPhase.weeks.map(week => {
                                    const isWeekExpanded = expandedWeeks[week.id];

                                    return (
                                        <div key={week.id} className="bg-white rounded-xl shadow-lg overflow-hidden">
                                            <div
                                                onClick={() => setExpandedWeeks({ ...expandedWeeks, [week.id]: !isWeekExpanded })}
                                                className="p-6 cursor-pointer hover:bg-gray-50 transition-colors"
                                            >
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center space-x-4">
                                                        {isWeekExpanded ? <ChevronDown className="w-5 h-5" /> : <ChevronRight className="w-5 h-5" />}
                                                        <h3 className="font-bold text-lg text-gray-800">{week.name}</h3>
                                                    </div>
                                                </div>
                                            </div>

                                            {isWeekExpanded && (
                                                <div className="px-6 pb-6 space-y-4 border-t border-gray-100 pt-4">
                                                    {week.topics.map(topic => {
                                                        const isTopicExpanded = expandedTopics[topic.id];
                                                        const topicProgress = calculateTopicProgress(topic);

                                                        return (
                                                            <div key={topic.id} className="bg-gray-50 rounded-lg">
                                                                <div
                                                                    onClick={() => setExpandedTopics({ ...expandedTopics, [topic.id]: !isTopicExpanded })}
                                                                    className="p-4 cursor-pointer hover:bg-gray-100 transition-colors rounded-lg"
                                                                >
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex items-center space-x-3 flex-1">
                                                                            {isTopicExpanded ? <ChevronDown className="w-5 h-5 text-gray-600" /> : <ChevronRight className="w-5 h-5 text-gray-600" />}
                                                                            <div className="flex-1">
                                                                                <h4 className="font-semibold text-gray-800">{topic.name}</h4>
                                                                                <p className="text-xs text-gray-500">{topic.subtopics?.length || 0} subtopics</p>
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-right ml-4">
                                                                            <span className="text-sm font-bold text-indigo-600">{topicProgress}%</span>
                                                                            <div className="w-20 bg-gray-300 rounded-full h-2 mt-1">
                                                                                <div 
                                                                                    className="bg-indigo-500 h-2 rounded-full transition-all duration-500"
                                                                                    style={{ width: `${topicProgress}%` }}
                                                                                />
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                {isTopicExpanded && topic.subtopics && (
                                                                    <div className="px-4 pb-4 space-y-2">
                                                                        {topic.subtopics.map(subtopic => (
                                                                            <div
                                                                                key={subtopic.id}
                                                                                className="flex items-center space-x-3 p-3 bg-white rounded-lg hover:shadow-md transition-all"
                                                                            >
                                                                                <button
                                                                                    onClick={() => toggleSubtopic(subtopic.id)}
                                                                                    className="flex-shrink-0"
                                                                                >
                                                                                    {progress[subtopic.id] ? (
                                                                                        <CheckCircle2 className="w-5 h-5 text-green-500" />
                                                                                    ) : (
                                                                                        <Circle className="w-5 h-5 text-gray-300" />
                                                                                    )}
                                                                                </button>
                                                                                <p className="text-sm text-gray-800 flex-1">{subtopic.name}</p>
                                                                                <button
                                                                                    onClick={() => openNoteEditor(subtopic.id, subtopic.name)}
                                                                                    className="px-2 py-1 bg-indigo-100 text-indigo-600 rounded text-xs hover:bg-indigo-200 transition-colors"
                                                                                >
                                                                                    {notes[subtopic.id] ? '📝' : '➕'}
                                                                                </button>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                    <div className="mt-4 p-4 bg-blue-50 rounded-lg border-l-4 border-blue-500">
                                                        <p className="font-semibold text-blue-900 mb-1">🎯 Project:</p>
                                                        <p className="text-blue-800">{week.project}</p>
                                                    </div>
                                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {currentTopic && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-6">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">
                                        Notes: {currentTopic.name}
                                    </h3>
                                    <textarea
                                        value={currentNote}
                                        onChange={(e) => setCurrentNote(e.target.value)}
                                        className="w-full h-64 p-4 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none resize-none"
                                        placeholder="Write your notes..."
                                    />
                                    <div className="flex justify-end space-x-3 mt-4">
                                        <button
                                            onClick={() => {
                                                setCurrentTopic(null);
                                                setCurrentNote('');
                                            }}
                                            className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={saveNote}
                                            className="px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors flex items-center space-x-2"
                                        >
                                            <Save className="w-4 h-4" />
                                            <span>Save</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // Stats View
            if (activeView === 'stats') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8">
                        <div className="max-w-6xl mx-auto">
                            <button
                                onClick={() => setActiveView('dashboard')}
                                className="mb-6 px-4 py-2 bg-white rounded-lg shadow hover:shadow-lg transition-all text-gray-700 font-medium"
                            >
                                ← Back
                            </button>

                            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-6">
                                <h2 className="text-3xl font-bold text-gray-800 mb-2">Statistics</h2>
                            </div>

                            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8">
                                <h3 className="text-xl font-bold text-gray-800 mb-6">Progress by Phase</h3>
                                <div className="space-y-6">
                                    {syllabus.phases.map((phase, index) => {
                                        const progress = calculatePhaseProgress(phase);
                                        return (
                                            <div key={index}>
                                                <div className="flex justify-between mb-2">
                                                    <span className="font-semibold text-gray-700">{phase.name}</span>
                                                    <span className="font-bold text-indigo-600">{progress}%</span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-4">
                                                    <div 
                                                        className="bg-gradient-to-r from-indigo-500 to-purple-500 h-4 rounded-full transition-all duration-500"
                                                        style={{ width: `${progress}%` }}
                                                    />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MLProgressTracker />);
    </script>
</body>
</html>
